name: Release Helm Chart

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-chart:
    name: Release chart to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clone the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Update Pages home on gh-pages
        run: |
          git fetch origin gh-pages
          workdir="$(mktemp -d)"
          git worktree add "$workdir" origin/gh-pages
          cp README.md "$workdir/index.md"
          cd "$workdir"
          git add index.md
          if git diff --cached --quiet; then
            echo "No Pages home changes to commit"
            exit 0
          fi
          git commit -m "docs: update Pages home"
          git push origin HEAD:gh-pages

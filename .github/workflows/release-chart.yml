name: Release Helm Chart

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-chart:
    name: Release chart to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Clone the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read chart version
        id: chart
        run: |
          version="$(awk '/^version:/ {print $2; exit}' charts/mackerel-operator/Chart.yaml)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/slashnephy/mackerel-operator
          tags: |
            type=raw,value=${{ steps.chart.outputs.version }}
            type=raw,value=latest

      - name: Build and push controller image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Update Pages home on gh-pages
        run: |
          git fetch origin gh-pages
          workdir="$(mktemp -d)"
          git worktree add "$workdir" origin/gh-pages
          cp README.md "$workdir/index.md"
          cd "$workdir"
          git add index.md
          if git diff --cached --quiet; then
            echo "No Pages home changes to commit"
            exit 0
          fi
          git commit -m "docs: update Pages home"
          git push origin HEAD:gh-pages

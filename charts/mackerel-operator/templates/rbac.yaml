apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "mackerel-operator.fullname" . }}-manager
  labels:
    {{- include "mackerel-operator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - mackerel.starry.blue
    resources:
      - externalmonitors
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - mackerel.starry.blue
    resources:
      - externalmonitors/finalizers
    verbs:
      - update
  - apiGroups:
      - mackerel.starry.blue
    resources:
      - externalmonitors/status
    verbs:
      - get
      - patch
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mackerel-operator.fullname" . }}-manager
  labels:
    {{- include "mackerel-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "mackerel-operator.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "mackerel-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "mackerel-operator.fullname" . }}-leader-election
  labels:
    {{- include "mackerel-operator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "mackerel-operator.fullname" . }}-leader-election
  labels:
    {{- include "mackerel-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "mackerel-operator.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "mackerel-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}

replicaCount: 1

image:
  repository: ghcr.io/slashnephy/mackerel-operator
  pullPolicy: IfNotPresent
  tag: "@sha256:4aa1bb33d55e6c60b9b7a49f55b60623624704bad14b53bab9705ae7b07350bd"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

mackerel:
  apiKeySecret:
    name: mackerel-api-key
    key: apiKey

leaderElection:
  enabled: true

policy: upsert-only
ownerID: default
hashLength: 7

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}

replicaCount: 1

image:
  repository: ghcr.io/slashnephy/mackerel-operator
  pullPolicy: IfNotPresent
  tag: "@sha256:a9050e4f6f6ef7575f78b706d51b2824baf9ae321b9838dec05923befe1bc948"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

mackerel:
  apiKeySecret:
    name: mackerel-api-key
    key: apiKey

leaderElection:
  enabled: true

policy: upsert-only
ownerID: default
hashLength: 7

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}

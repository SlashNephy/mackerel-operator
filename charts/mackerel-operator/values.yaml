replicaCount: 1

image:
  repository: ghcr.io/slashnephy/mackerel-operator
  pullPolicy: IfNotPresent
  tag: "@sha256:394072951a0151b86302d30bcb1052f23b6a3220b49a44fc118691b376602f4e"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

mackerel:
  apiKeySecret:
    name: mackerel-api-key
    key: apiKey

leaderElection:
  enabled: true

policy: upsert-only
ownerID: default
hashLength: 7

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}

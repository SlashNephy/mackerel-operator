# This rule is not used by the project mackerel-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to mackerel.starry.blue resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: mackerel-operator
    app.kubernetes.io/managed-by: kustomize
  name: externalmonitor-viewer-role
rules:
- apiGroups:
  - mackerel.starry.blue
  resources:
  - externalmonitors
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - mackerel.starry.blue
  resources:
  - externalmonitors/status
  verbs:
  - get
